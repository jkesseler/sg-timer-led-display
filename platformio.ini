; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = main-firmware
src_dir = ESP32-S3-firmware/src
lib_dir = ESP32-S3-firmware/lib
include_dir = ESP32-S3-firmware/include
test_dir = ESP32-S3-firmware/test
data_dir = ESP32-S3-firmware/data

[base]
board = esp32-s3-devkitc-1-n16r8v
framework = arduino
monitor_speed = 115200
platform = espressif32
upload_speed = 460800

[build_flags]
build_flags =
	-DBOARD_HAS_PSRAM=1
	-DCONFIG_BT_ENABLED=1
	-DCORE_DEBUG_LEVEL=3
	-DARDUINO_USB_CDC_ON_BOOT=0

[lib_deps_main]
lib_deps =
	adafruit/Adafruit GFX Library@^1.12.3
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.14
	olikraus/U8g2_for_Adafruit_GFX@^1.8.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
	tzapu/WiFiManager@^2.0.17


[lib_deps_common]
lib_deps =
	ESP32 BLE arduino
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4

[env:main-firmware]
extends = build_flags, base, lib_deps_common, lib_deps_main
build_src_filter =
	+<*>
	-<../tools/*>


[env:tools-led-matrix]
extends = build_flags, base, lib_deps_common, lib_deps_main
test_build_src = yes
build_flags =
	${build_flags.build_flags}
	-DDEBUG_BUILD
build_src_filter =
	+<../tools/led-matrix.cpp>
	-<*>


[env:tools-scanner]
extends = build_flags, base, lib_deps_common
test_build_src = yes
build_flags =
	${build_flags.build_flags}
	-DDEBUG_BUILD
build_src_filter =
	+<../tools/scanner.cpp>
	-<*>

[env:test-led-matrix]
extends = build_flags, base, lib_deps_common, lib_deps_main
test_build_src = yes
build_flags =
	${build_flags.build_flags}
	-DDEBUG_BUILD
build_src_filter =
	+<../tools/wifi-config.cpp>
	-<*>



; ═══════════════════════════════════════════════════════════════
; Native automated tests — run on host PC, no hardware required
; Framework: GoogleTest
; Run:       pio test -e native-tests
; ═══════════════════════════════════════════════════════════════
[env:native-tests]
platform = native
test_framework = googletest
build_flags =
	-std=c++17
	-DNATIVE_TEST_BUILD
	-I ESP32-S3-firmware/test/stubs
	-I ESP32-S3-firmware/include
build_src_filter =
	-<*>
test_filter =
	test_*


; ═══════════════════════════════════════════════════════════════
; BLE-LoRa Bridge — LilyGo LoRa32 T3 v1.6.1
; Single firmware for both Transmitter (BLE→LoRa) and
; Receiver (LoRa→MQTT or LoRa→BLE Special Pie) roles.
; Role is configured at runtime via WiFiManager web portal.
; ═══════════════════════════════════════════════════════════════


[lora-bridge-build-flags]
build_flags =
	-DCONFIG_BT_ENABLED=1
	-DCORE_DEBUG_LEVEL=3
	-I BLE-LoRa-Bridge/include
	-I ESP32-S3-firmware/include

[lora-bridge-lib-deps]
lib_deps =
	ESP32 BLE arduino
	Wire
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
	tzapu/WiFiManager@^2.0.17
	sandeepmistry/LoRa@^0.8.0
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1

; Shared source files pulled from ESP32-S3-firmware via build_src_filter.
; BLE-LoRa-Bridge/include/common.h takes precedence over ESP32-S3-firmware/include/common.h
; because -I BLE-LoRa-Bridge/include appears first in the build flags.
;
; Paths in build_src_filter are relative to the global src_dir (ESP32-S3-firmware/src).
[lora-bridge-shared-sources]
build_src_filter =
	-<*>
	+<../../BLE-LoRa-Bridge/src/*>
	+<Logger.cpp>
	+<DeviceId.cpp>
	+<MqttManager.cpp>
	+<ASNTracker.cpp>
	+<SGTimer.cpp>
	+<SpecialPieM1A2Plus.cpp>
	+<SpecialPieM1A2F.cpp>

; LILYGO LoRa32 T3 v1.6.1 (ESP32 + SX1276 LoRa + 0.96" OLED, 4MB Flash)
; LoRa SX1276 pins: NSS=18, RST=14, DIO0=26, SCK=5, MOSI=27, MISO=19
; OLED SSD1306 pins: SDA=21, SCL=22, RST=16
; Battery ADC: GPIO35
[env:lilygo-lora32-t3-v161]
extends = lora-bridge-base, lora-bridge-build-flags, lora-bridge-lib-deps, lora-bridge-shared-sources
board = ttgo-lora32-v1
build_flags =
	${lora-bridge-build-flags.build_flags}
	-DBOARD_LILYGO_LORA32_T3_V161
	-DLORA_NSS=18
	-DLORA_RST=14
	-DLORA_DIO0=26
	-DLORA_SCK=5
	-DLORA_MOSI=27
	-DLORA_MISO=19
	-DOLED_SDA=21
	-DOLED_SCL=22
	-DOLED_RST=16
	-DBATTERY_ADC_PIN=35
monitor_speed = 115200


[lora-bridge-base]
board = ttgo-lora32-v21
board_build.partitions = huge_app.csv
platform = espressif32
framework = arduino

[env:lora-bridge-tools-lora-test]
extends = lora-bridge-base, lora-bridge-build-flags
lib_deps =
	ESP32 BLE arduino
	sandeepmistry/LoRa@^0.8.0
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1
build_src_filter =
	-<*>
	+<../../BLE-LoRa-Bridge/tools/lora-test.cpp>
	+<../../BLE-LoRa-Bridge/src/LoRaPacket.cpp>
	+<Logger.cpp>
