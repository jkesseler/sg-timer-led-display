; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = main-firmware
src_dir = ESP32-S3-firmware/src
lib_dir = ESP32-S3-firmware/lib
include_dir = ESP32-S3-firmware/include
test_dir = ESP32-S3-firmware/test
data_dir = ESP32-S3-firmware/data

[base]
board = esp32-s3-devkitc-1-n16r8v
framework = arduino
monitor_speed = 115200
platform = espressif32
upload_speed = 460800

[build_flags]
build_flags =
	-DBOARD_HAS_PSRAM=1
	-DCONFIG_BT_ENABLED=1
	-DCORE_DEBUG_LEVEL=3
	-DARDUINO_USB_CDC_ON_BOOT=0

[lib_deps_main]
lib_deps =
	adafruit/Adafruit GFX Library@^1.12.3
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.14
	olikraus/U8g2_for_Adafruit_GFX@^1.8.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
	tzapu/WiFiManager@^2.0.17


[lib_deps_common]
lib_deps =
	ESP32 BLE arduino
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4

[env:main-firmware]
extends = build_flags, base, lib_deps_common, lib_deps_main
build_src_filter =
	+<*>
	-<../tools/*>


[env:tools-led-matrix]
extends = build_flags, base, lib_deps_common, lib_deps_main
test_build_src = yes
build_flags =
	${build_flags.build_flags}
	-DDEBUG_BUILD
build_src_filter =
	+<../tools/led-matrix.cpp>
	-<*>


[env:tools-scanner]
extends = build_flags, base, lib_deps_common
test_build_src = yes
build_flags =
	${build_flags.build_flags}
	-DDEBUG_BUILD
build_src_filter =
	+<../tools/scanner.cpp>
	-<*>

[env:tools-wifi-config]
extends = build_flags, base
lib_deps =
	tzapu/WiFiManager@^2.0.17
test_build_src = yes
build_flags =
	${build_flags.build_flags}
	-DDEBUG_BUILD
build_src_filter =
	+<../tools/wifi-config.cpp>
	-<*>



; ═══════════════════════════════════════════════════════════════
; Native automated tests — run on host PC, no hardware required
; Framework: GoogleTest
; Run:       pio test -e native-tests
; ═══════════════════════════════════════════════════════════════
[env:native-tests]
platform = native
test_framework = googletest
build_flags =
	-std=c++17
	-DNATIVE_TEST_BUILD
	-I ESP32-S3-firmware/test/stubs
	-I ESP32-S3-firmware/include
build_src_filter =
	-<*>
test_filter =
	test_*
